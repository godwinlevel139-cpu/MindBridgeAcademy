{% extends "base.html" %}
{% block content %}

<h2>Admin Dashboard</h2>

<p>Total Revenue: ₦{{ revenue }}</p>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Paid","Unpaid"],
datasets:[{data:[{{ paid }},{{ unpaid }}]}]
}
})
</script>

<table class="table mt-4">

<tr>
<th>Name</th><th>Email</th><th>Status</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.email }}</td>
<td>{{ "Paid" if s.paid else "Unpaid" }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
