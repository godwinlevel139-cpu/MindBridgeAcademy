<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
    <h1>Admin Dashboard</h1>
    <a href="{{ url_for('admin_logout') }}" class="button">Logout</a>
</header>

<main>
    <div style="text-align:center; margin:20px;">
        <p>Total Students: {{ students|length }}</p>
        <p>Total Revenue: ${{ revenue }}</p>
        <a href="{{ url_for('export_students') }}" class="button">Download CSV</a>
    </div>
    <table>
        <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Courses</th><th>Total Fee</th><th>Paid</th>
        </tr>
        {% for s in students %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.email }}</td>
            <td>{{ s.courses }}</td>
            <td>{{ s.total_fee }}</td>
            <td>{{ 'Yes' if s.payment_done else 'No' }}</td>
        </tr>
        {% endfor %}
    </table>
</main>
</body>
</html>
