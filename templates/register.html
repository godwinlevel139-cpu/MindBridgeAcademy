{% extends "base.html" %}
{% block content %}
<h2>Student Registration</h2>
<form method="POST" action="/register">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Courses (select multiple with Ctrl/Cmd)</label>
        <select name="courses" class="form-select" multiple required>
            <option value="AI">AI</option>
            <option value="Digital Marketing">Digital Marketing</option>
            <option value="Mathematics">Mathematics</option>
            <option value="English">English</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Physics">Physics</option>
            <option value="Special Education">Special Education</option>
            <option value="Academic Counselling">Academic Counselling</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Total Fee</label>
        <input type="number" name="fee" class="form-control" required>
    </div>
    <button class="btn btn-success">Register</button>
</form>
{% endblock %}
