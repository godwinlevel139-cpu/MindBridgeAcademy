<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
    <h1>Register as Student</h1>
</header>

<form method="POST">
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Courses</label>
    {% for course, price in prices.items() %}
        <div>
            <input type="checkbox" name="courses" value="{{ course }}">
            {{ course }} (${{ price }})
        </div>
    {% endfor %}

    <button type="submit" class="button">Proceed to Payment</button>
</form>
</body>
</html>
