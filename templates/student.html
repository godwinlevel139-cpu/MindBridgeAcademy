<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registered Students</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9fafb;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        th {
            background: #1e3a8a;
            color: white;
        }
        tr:hover {
            background: #f1f5f9;
        }
        a {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
    </style>
</head>
<body>

<a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

<h2>📋 Registered Students</h2>

<table>
    {% for row in students %}
        {% if loop.index == 1 %}
            <tr>
                {% for cell in row %}
                    <th>{{ cell }}</th>
                {% endfor %}
            </tr>
        {% else %}
            <tr>
                {% for cell in row %}
                    <td>{{ cell }}</td>
                {% endfor %}
            </tr>
        {% endif %}
    {% endfor %}
</table>

</body>
</html>
