<!DOCTYPE html>
<html>
<head>
    <title>MindBridge Academy</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f9fafb;
        }
        header {
            background: #1e3a8a;
            color: white;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header img {
            height: 50px;
        }
        header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }
        .hero {
            background: linear-gradient(
                rgba(30,58,138,0.8),
                rgba(30,58,138,0.8)
            ), url("/static/images/students.jpg");
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 40px;
            text-align: center;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .hero a {
            background: #2563eb;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<header>
    <img src="/static/images/logo.png" alt="MindBridge Academy">
    <nav>
        <a href="/">Home</a>
        <a href="/register">Register</a>
        <a href="/admin/login">Admin</a>
    </nav>
</header>

<section class="hero">
    <h1>Empowering Minds. Building Futures.</h1>
    <p>Quality Education • Expert Tutors • Global Skills</p>
    <a href="/register">Enroll Now</a>
</section>

</body>
</html>
